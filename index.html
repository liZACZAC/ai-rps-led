<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>包剪揼 AI 燈光控制 (可換鏡頭版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; margin: 20px; background-color: #f4f4f9; }
        .btn-group { display: flex; gap: 10px; justify-content: center; max-width: 350px; margin: 0 auto 20px auto; }
        button { padding: 15px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; color: white; flex: 1; cursor: pointer; }
        #btn-start { background-color: #34c759; } /* 綠色 */
        #btn-switch { background-color: #007aff; display: none; } /* 藍色，初始隱藏 */
        button:active { opacity: 0.8; }
        #webcam-container { margin: 0 auto; border-radius: 15px; overflow: hidden; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #000; }
        video { width: 100%; height: auto; display: block; }
        .label { font-size: 24px; font-weight: bold; margin-top: 15px; color: #333; }
        .status { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>AI 燈光控制 (可換鏡頭版)</h2>
    
    <div class="btn-group">
        <button type="button" id="btn-start" onclick="init()">啟動系統</button>
        <button type="button" id="btn-switch" onclick="switchCamera()">🔄 切換鏡頭</button>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div id="label-container" class="label">等待啟動...</div>
    <div id="mqtt-status" class="status">MQTT 連線狀態：未連線</div>

<script type="text/javascript">
    // --- MQTT 設定 ---
    const mqttBroker = "broker.emqx.io";
    const mqttPort = 8084;
    const mqttTopic = "myzac/teachable_rps/led";
    let mqttClient;
    let lastSentMessage = "";

    function connectMQTT() {
        const clientId = "ios_" + Math.random().toString(16).substr(2, 8);
        mqttClient = new Paho.MQTT.Client(mqttBroker, mqttPort, clientId);
        mqttClient.onConnectionLost = (responseObject) => {
            if (responseObject.errorCode !== 0) {
                document.getElementById("mqtt-status").innerText = "MQTT 連線中斷: " + responseObject.errorMessage;
            }
        };
        mqttClient.connect({
            useSSL: true,
            onSuccess: () => document.getElementById("mqtt-status").innerText = "MQTT 已連線",
            onFailure: (e) => document.getElementById("mqtt-status").innerText = "MQTT 連線失敗: " + e.errorMessage
        });
    }

    function sendMqttMessage(msg) {
        if (mqttClient && mqttClient.isConnected() && msg !== lastSentMessage) {
            const message = new Paho.MQTT.Message(msg);
            message.destinationName = mqttTopic;
            mqttClient.send(message);
            lastSentMessage = msg;
            console.log("已發送指令: " + msg);
        }
    }

    // --- Teachable Machine 与 鏡頭控制 ---
    const URL = "https://teachablemachine.withgoogle.com/models/mpVvaMe47/";
    let model, maxPredictions;
    const videoElement = document.getElementById("webcam");
    
    let currentStream = null;
    let currentFacingMode = "user"; // "user" 代表前置，"environment" 代表後置
    let isLooping = false;

    async function init() {
        document.getElementById("btn-start").style.display = "none"; // 隱藏啟動按鈕
        connectMQTT();
        document.getElementById("label-container").innerText = "模型載入中...";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 啟動相機
        await startCamera();
        
        // 顯示切換鏡頭按鈕
        document.getElementById("btn-switch").style.display = "block";
        
        // 啟動辨識迴圈（只啟動一次）
        if (!isLooping) {
            isLooping = true;
            window.requestAnimationFrame(loop);
        }
    }

    // 核心功能：啟動/切換相機串流
    async function startCamera() {
        // 如果原本有串流在跑，先關閉它，釋放鏡頭權限
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        try {
            const constraints = {
                video: { facingMode: currentFacingMode }
            };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = currentStream;
            
            // 根據鏡頭動態調整鏡像效果
            if (currentFacingMode === "user") {
                videoElement.style.transform = "scaleX(-1)"; // 前置鏡頭像照鏡子
            } else {
                videoElement.style.transform = "scaleX(1)";  // 後置鏡頭正常顯示
            }

            await videoElement.play();
        } catch (error) {
            document.getElementById("label-container").innerText = "無法獲取相機權限！";
            console.error("Camera error:", error);
        }
    }

    // 按鈕點擊事件：切換前後鏡頭
    async function switchCamera() {
        // 切換狀態
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        document.getElementById("label-container").innerText = "正在切換鏡頭...";
        await startCamera();
    }

    async function loop() {
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // 檢查視訊是否真的準備好，避免切換瞬間出錯
        if (videoElement.readyState < 2) return;

        const predictions = await model.predict(videoElement);
        let highestProb = 0;
        let bestClass = "";

        for (let i = 0; i < maxPredictions; i++) {
            if (predictions[i].probability > highestProb) {
                highestProb = predictions[i].probability;
                bestClass = predictions[i].className;
            }
        }

        document.getElementById("label-container").innerText = `目前辨識: ${bestClass} (${Math.round(highestProb * 100)}%)`;

        if (highestProb > 0.8) {
            if (bestClass.includes("R")) sendMqttMessage("R");
            else if (bestClass.includes("G")) sendMqttMessage("G");
            else if (bestClass.includes("B")) sendMqttMessage("B");
            else if (bestClass.includes("empty")) sendMqttMessage("OFF");
        }
    }
</script>
</body>
</html>
